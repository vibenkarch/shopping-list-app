<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쇼핑 리스트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .app {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    width: 100%;
    max-width: 480px;
    padding: 32px;
  }
  h1 {
    font-size: 28px;
    color: #2d3748;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .subtitle {
    color: #718096;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  #item-input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  #item-input:focus {
    border-color: #667eea;
  }
  #add-btn {
    padding: 12px 20px;
    background: #667eea;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  #add-btn:hover { background: #5a67d8; }
  #add-btn:active { transform: scale(0.97); }
  .stats {
    font-size: 13px;
    color: #718096;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
  }
  .clear-done {
    background: none;
    border: none;
    color: #e53e3e;
    cursor: pointer;
    font-size: 13px;
    padding: 0;
  }
  .clear-done:hover { text-decoration: underline; }
  .clear-done:disabled { color: #cbd5e0; cursor: default; text-decoration: none; }
  ul {
    list-style: none;
    max-height: 50vh;
    overflow-y: auto;
  }
  li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: #f7fafc;
    border-radius: 10px;
    margin-bottom: 8px;
    transition: background 0.2s;
  }
  li:hover { background: #edf2f7; }
  li.done .item-text {
    text-decoration: line-through;
    color: #a0aec0;
  }
  .checkbox {
    width: 22px;
    height: 22px;
    cursor: pointer;
    accent-color: #667eea;
    flex-shrink: 0;
  }
  .item-text {
    flex: 1;
    color: #2d3748;
    word-break: break-all;
  }
  .delete-btn {
    background: none;
    border: none;
    color: #cbd5e0;
    cursor: pointer;
    font-size: 20px;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .delete-btn:hover {
    color: #e53e3e;
    background: #fed7d7;
  }
  .empty {
    text-align: center;
    color: #a0aec0;
    padding: 40px 20px;
    font-size: 14px;
  }
</style>
</head>
<body>
  <div class="app">
    <h1>🛒 쇼핑 리스트</h1>
    <p class="subtitle">필요한 물건을 추가하고 체크해 보세요</p>

    <div class="input-row">
      <input id="item-input" type="text" placeholder="추가할 물건 이름..." maxlength="100" />
      <button id="add-btn">추가</button>
    </div>

    <div class="stats">
      <span id="stats-text">0개 항목</span>
      <button class="clear-done" id="clear-done-btn">완료된 항목 삭제</button>
    </div>

    <ul id="list"></ul>
  </div>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const SUPABASE_URL = "https://ecfmkpqgcqoafwrlvzij.supabase.co";
  const SUPABASE_KEY = "sb_publishable_Yjbf01UHUhk1frND2LQFhQ_sS2aLscH";
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  const input = document.getElementById("item-input");
  const addBtn = document.getElementById("add-btn");
  const list = document.getElementById("list");
  const statsText = document.getElementById("stats-text");
  const clearDoneBtn = document.getElementById("clear-done-btn");

  let items = [];

  async function loadItems() {
    const { data, error } = await supabase
      .from("shopping_items")
      .select("id, text, done, created_at")
      .order("created_at", { ascending: true });
    if (error) {
      console.error("항목 불러오기 실패:", error);
      items = [];
      return;
    }
    items = data ?? [];
  }

  function render() {
    list.innerHTML = "";
    if (items.length === 0) {
      const empty = document.createElement("li");
      empty.className = "empty";
      empty.textContent = "아직 추가된 항목이 없어요";
      empty.style.background = "transparent";
      list.appendChild(empty);
    } else {
      for (const item of items) {
        const li = document.createElement("li");
        if (item.done) li.classList.add("done");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "checkbox";
        checkbox.checked = item.done;
        checkbox.addEventListener("change", () => toggleItem(item.id));

        const span = document.createElement("span");
        span.className = "item-text";
        span.textContent = item.text;

        const del = document.createElement("button");
        del.className = "delete-btn";
        del.textContent = "✕";
        del.title = "삭제";
        del.addEventListener("click", () => deleteItem(item.id));

        li.append(checkbox, span, del);
        list.appendChild(li);
      }
    }
    const doneCount = items.filter(i => i.done).length;
    statsText.textContent = `${items.length}개 항목 · ${doneCount}개 완료`;
    clearDoneBtn.disabled = doneCount === 0;
  }

  async function addItem() {
    const text = input.value.trim();
    if (!text) return;
    addBtn.disabled = true;
    const { data, error } = await supabase
      .from("shopping_items")
      .insert({ text, done: false })
      .select()
      .single();
    addBtn.disabled = false;
    if (error) {
      console.error("항목 추가 실패:", error);
      return;
    }
    items.push(data);
    input.value = "";
    render();
    input.focus();
  }

  async function toggleItem(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    const next = !item.done;
    const { error } = await supabase
      .from("shopping_items")
      .update({ done: next })
      .eq("id", id);
    if (error) {
      console.error("항목 업데이트 실패:", error);
      return;
    }
    item.done = next;
    render();
  }

  async function deleteItem(id) {
    const { error } = await supabase
      .from("shopping_items")
      .delete()
      .eq("id", id);
    if (error) {
      console.error("항목 삭제 실패:", error);
      return;
    }
    items = items.filter(i => i.id !== id);
    render();
  }

  async function clearDone() {
    const doneIds = items.filter(i => i.done).map(i => i.id);
    if (doneIds.length === 0) return;
    const { error } = await supabase
      .from("shopping_items")
      .delete()
      .in("id", doneIds);
    if (error) {
      console.error("완료 항목 삭제 실패:", error);
      return;
    }
    items = items.filter(i => !i.done);
    render();
  }

  addBtn.addEventListener("click", addItem);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") addItem();
  });
  clearDoneBtn.addEventListener("click", clearDone);

  await loadItems();
  render();
  input.focus();
</script>
</body>
</html>
